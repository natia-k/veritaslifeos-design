<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas LifeOS | Premium Redesign</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-dot"></div>
                <span>Veritas OS</span>
            </div>
            
            <nav class="nav-group">
                <small>PLANNING</small>
                <div class="nav-item active">Today</div>
                <div class="nav-item">Upcoming</div>
                <div class="nav-item">Logbook</div>
            </nav>

            <nav class="nav-group">
                <small>SYSTEMS</small>
                <div class="nav-item">Growth</div>
                <div class="nav-item">Wealth</div>
                <div class="nav-item">Knowledge</div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="focus-header">
                <h1 id="greeting">Good Morning.</h1>
                <p id="focus-subtitle">Here is your intentional flow for today.</p>
            </header>

            <div class="task-container">
                <div class="task-card" onclick="toggleTask(this)">
                    <div class="check-wrapper">
                        <div class="check-circle"></div>
                    </div>
                    <div class="task-info">
                        <span class="task-title">Redesign Mission Control UI</span>
                        <span class="task-meta">Project: Design System</span>
                    </div>
                </div>

                <div class="task-card" onclick="toggleTask(this)">
                    <div class="check-wrapper">
                        <div class="check-circle"></div>
                    </div>
                    <div class="task-info">
                        <span class="task-title">Review LifeOS Performance Metrics</span>
                        <span class="task-meta">Project: Operations</span>
                    </div>
                </div>

                <div class="task-card" onclick="toggleTask(this)">
                    <div class="check-wrapper">
                        <div class="check-circle"></div>
                    </div>
                    <div class="task-info">
                        <span class="task-title">Deep Work: Q3 Strategy</span>
                        <span class="task-meta">Project: Growth</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="theme-switch" id="themeBtn">
        <span class="icon">🌓</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
