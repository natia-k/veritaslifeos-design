<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas LifeOS x Anytype</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="nav-section">
                    <div class="nav-item active">Dashboard</div>
                    <div class="nav-item">Areas</div>
                    <div class="nav-item">Collections</div>
                </div>
                <div class="nav-section">
                    <small>FAVORITES</small>
                    <div class="nav-item">Wealth Lab</div>
                    <div class="nav-item">Growth Sync</div>
                </div>
            </div>
        </aside>

        <main class="main-canvas">
            <div class="content-wrapper">
                <header class="view-header">
                    <h1>Mission Control</h1>
                    <div class="progress-container">
                        <div class="progress-label">Today's Progress — 65%</div>
                        <div class="progress-track"><div class="progress-fill" style="width: 65%"></div></div>
                    </div>
                </header>

                <section class="pillar-grid">
                    <div class="pillar-card">
                        <h3>Growth</h3>
                        <p>12 Active Projects</p>
                    </div>
                    <div class="pillar-card">
                        <h3>Wealth</h3>
                        <p>On Track</p>
                    </div>
                    <div class="pillar-card">
                        <h3>Vigor</h3>
                        <p>Level 08</p>
                    </div>
                </section>

                <section class="task-section">
                    <h2>Active Operations</h2>
                    <div class="task-item" onclick="this.classList.toggle('completed')">
                        <div class="checkbox"></div>
                        <div class="task-info">
                            <div class="task-title">Integrate OS Core Engine</div>
                            <div class="task-meta">Systems • High Priority</div>
                        </div>
                    </div>
                    <div class="task-item" onclick="this.classList.toggle('completed')">
                        <div class="checkbox"></div>
                        <div class="task-info">
                            <div class="task-title">Quarterly Capital Flow Audit</div>
                            <div class="task-meta">Wealth • Routine</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
