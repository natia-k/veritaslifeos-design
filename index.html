<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERITAS // OS</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">V.</div>
                <nav>
                    <div class="nav-item active">CONTROL</div>
                    <div class="nav-item">WEALTH</div>
                    <div class="nav-item">KNOWLEDGE</div>
                    <div class="nav-item">BIO-HACK</div>
                </nav>
            </div>
            <button id="themeBtn" class="side-btn">DARK / LIGHT</button>
        </aside>

        <main class="main-content">
            <div class="top-nav">
                <span class="breadcrumb">SYSTEM / MISSION CONTROL</span>
                <span class="clock" id="clock">00:00:00</span>
            </div>

            <section class="hero-section">
                <h1>SYSTEM: <span class="glitch">OPTIMIZED</span></h1>
                <div class="global-progress-container">
                    <div class="progress-bar-main"><div class="fill" style="width: 74%"></div></div>
                    <div class="progress-labels"><span>DAILY OUTPUT</span> <span>74%</span></div>
                </div>
            </section>

            <div class="pillar-grid">
                <div class="pillar-card">
                    <div class="p-label">01 / GROWTH</div>
                    <div class="p-value">12 ACTIVE</div>
                    <div class="p-bar"><div class="p-fill" style="width: 80%"></div></div>
                </div>
                <div class="pillar-card">
                    <div class="p-label">02 / WEALTH</div>
                    <div class="p-value">$14,200.00</div>
                    <div class="p-bar"><div class="p-fill" style="width: 45%"></div></div>
                </div>
                <div class="pillar-card">
                    <div class="p-label">03 / MIND</div>
                    <div class="p-value">SYNCHRONIZED</div>
                    <div class="p-bar"><div class="p-fill" style="width: 100%"></div></div>
                </div>
            </div>

            <section class="task-sprints">
                <div class="section-title">ACTIVE SPRINTS</div>
                <div class="task-table">
                    <div class="task-item" onclick="toggleTask(this)">
                        <div class="status-box"></div>
                        <span class="t-name">INTEGRATE OS CORE ENGINE</span>
                        <span class="t-tag">CRITICAL</span>
                    </div>
                    <div class="task-item" onclick="toggleTask(this)">
                        <div class="status-box"></div>
                        <span class="t-name">WEALTH PROTOCOL AUDIT</span>
                        <span class="t-tag">ROUTINE</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
